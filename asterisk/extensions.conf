; ─── extensions.conf — Dialplan for Alpha PBX AI bot ─────────────────────────
;
; Copy this file to /etc/asterisk/extensions.conf  (or include from there)
; Then run:  asterisk -rx "dialplan reload"
;
; Flow:
;   Caller dials 09647664295
;     → Alpha PBX routes to SIP extension 101
;       → Asterisk answers
;         → AudioSocket streams audio to bridge_to_ws.py (port 9092)
;           → bridge_to_ws.py forwards to Pipecat FastAPI /ws (port 7860)
;             → AI bot responds

[from-alphapbx]

; ── Inbound call to extension 101 (the AI bot) ──────────────────────────────
exten => 101,1,NoOp(Inbound call from ${CALLERID(num)} to AI bot)
 same => n,Answer()
 same => n,Wait(1)                              ; brief pause after answer
 same => n,Set(CALL_UUID=${UNIQUEID})
 same => n,AudioSocket(127.0.0.1:9092,${CALL_UUID})  ; bridge to bot
 same => n,Hangup()

; ── Fallback: any extension hits the bot ────────────────────────────────────
exten => _X.,1,NoOp(Fallback — routing ${EXTEN} to AI bot)
 same => n,Answer()
 same => n,Wait(1)
 same => n,AudioSocket(127.0.0.1:9092,${UNIQUEID})
 same => n,Hangup()

; ── Hangup handler ───────────────────────────────────────────────────────────
exten => h,1,NoOp(Call ${UNIQUEID} hung up)


; ═══════════════════════════════════════════════════════════════════════════════
; [outbound-bot] — context for AI-originated outbound calls
;
; Flow (triggered by AMI Originate):
;   ami_client.py sends Originate → Asterisk dials SIP/alphapbx-trunk/<number>
;   Callee answers → Asterisk runs this context (exten s, priority 1)
;   AudioSocket bridges audio to bridge_to_ws.py → Pipecat /ws → AI bot
; ═══════════════════════════════════════════════════════════════════════════════
[outbound-bot]

exten => s,1,NoOp(Outbound AI call to ${OUTBOUND_TO} from ${OUTBOUND_FROM})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Set(CALL_UUID=${UNIQUEID})
 ; Pass outbound metadata to bridge via UUID (bridge reads it from AudioSocket UUID frame)
 same => n,Set(CHANNEL(callgroup)=outbound)
 same => n,AudioSocket(127.0.0.1:9092,${CALL_UUID})
 same => n,Hangup()

exten => h,1,NoOp(Outbound call ${UNIQUEID} ended)
