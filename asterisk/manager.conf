; ─── manager.conf — Asterisk Manager Interface ─────────────────────────────────
;
; Copy this file to /etc/asterisk/manager.conf
; Then run:  asterisk -rx "manager reload"
;
; This allows ami_client.py (running alongside Asterisk) to originate
; outbound calls through the Alpha PBX SIP trunk.

[general]
enabled  = yes
port     = 5038
bindaddr = 127.0.0.1     ; only localhost — never expose AMI to the internet

; ── Pipecat service account ──────────────────────────────────────────────────
[pipecat]
secret  = pipecat_secret          ; change this — also update AMI_SECRET in .env
deny    = 0.0.0.0/0.0.0.0
permit  = 127.0.0.1/255.255.255.0
read    = all
write   = originate,system,call
