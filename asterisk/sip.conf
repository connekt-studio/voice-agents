; ─── sip.conf — Alpha PBX (connektstudio) SIP registration ───────────────────
;
; Copy this file to /etc/asterisk/sip.conf  (or include from there)
; Then run:  asterisk -rx "sip reload"
;
; Alpha PBX account:
;   SIP Server : connektstudio.alphapbx.net:8090  (UDP)
;   Extension  : 101
;   Password   : TFbY47W4tP8Jg4
;   DID Number : 09647664295

[general]
; Register extension 101 with Alpha PBX
; Format: register => user:password@host:port/extension
register => 101:TFbY47W4tP8Jg4@connektstudio.alphapbx.net:8090/101

context     = from-alphapbx      ; default context for incoming calls
bindport    = 5060
bindaddr    = 0.0.0.0
srvlookup   = yes
dtmfmode    = rfc2833
nat         = force_rport,comedia


; ── Alpha PBX trunk ──────────────────────────────────────────────────────────
[alphapbx-trunk]
type        = peer
host        = connektstudio.alphapbx.net
port        = 8090
username    = 101
secret      = TFbY47W4tP8Jg4
fromuser    = 101
fromdomain  = connektstudio.alphapbx.net
insecure    = invite,port
qualify     = yes
canreinvite = no
dtmfmode    = rfc2833
context     = from-alphapbx
nat         = force_rport,comedia
